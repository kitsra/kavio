name: Render E2E

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "site/**"
      - "**.md"
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "site/**"
      - "**.md"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render-e2e:
    name: Render end-to-end smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        uses: ./.github/actions/setup

      # Unlike the default `verify` job, this job allows the reviewed
      # ffmpeg-static build script through pnpm-workspace.yaml so real rendering
      # can be exercised. The default suite stays binary-free.
      - name: Install dependencies (allow bundled binary builds)
        run: corepack pnpm install --frozen-lockfile

      - name: Verify render optional packages
        run: corepack pnpm run verify:render-optional-deps

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('packages/render/package.json') }}

      # The Playwright CDN occasionally stalls after the download completes;
      # bound each attempt and retry once instead of eating the job timeout.
      - name: Install Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        timeout-minutes: 10
        run: |
          for attempt in 1 2; do
            if timeout 240 corepack pnpm --filter @kitsra/kavio-render exec playwright install --with-deps chromium; then
              exit 0
            fi
            echo "playwright install attempt ${attempt} failed or stalled; retrying"
          done
          exit 1

      # Browsers came from the cache; only the OS packages need installing.
      - name: Install Chromium system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: corepack pnpm --filter @kitsra/kavio-render exec playwright install-deps chromium

      - name: Build
        run: corepack pnpm run build

      - name: Render end-to-end smoke
        run: corepack pnpm --filter @kitsra/kavio-render run test:e2e
