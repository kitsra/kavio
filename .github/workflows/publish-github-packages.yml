name: Publish GitHub Packages

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-github-packages
  cancel-in-progress: false

jobs:
  publish:
    name: Publish @kavio packages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@kavio"

      - name: Enable Corepack
        run: corepack enable

      - name: Verify pnpm age-gate support
        run: |
          PNPM_VERSION="$(corepack pnpm --version)"
          export PNPM_VERSION
          echo "Using pnpm ${PNPM_VERSION}"
          node --input-type=module <<'NODE'
          const version = process.env.PNPM_VERSION?.split("-")[0] ?? "";
          const [major = 0, minor = 0] = version.split(".").map(Number);
          if (major < 10 || (major === 10 && minor < 16)) {
            throw new Error(`pnpm ${process.env.PNPM_VERSION} does not support the configured age gate`);
          }
          NODE

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile --ignore-scripts

      - name: Build
        run: corepack pnpm run build

      - name: Verify package contents
        run: corepack pnpm run pack:dry

      - name: Publish workspace packages
        run: corepack pnpm -r --filter './packages/*' publish --access public --no-git-checks --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
