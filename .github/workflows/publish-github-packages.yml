name: Publish GitHub Packages

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-github-packages
  cancel-in-progress: false

jobs:
  publish:
    name: Publish @kitsra packages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          registry-url: https://npm.pkg.github.com
          scope: "@kitsra"

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile --ignore-scripts

      - name: Build
        run: corepack pnpm run build

      - name: Publish workspace packages
        run: corepack pnpm -r --filter './packages/*' publish --access public --no-git-checks --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
