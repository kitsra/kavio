name: Publish GitHub Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "packages/*/package.json"
      - "packages/*/CHANGELOG.md"

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-github-packages
  cancel-in-progress: false

jobs:
  publish:
    name: Publish @kitsra packages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          registry-url: https://npm.pkg.github.com
          scope: "@kitsra"

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile --ignore-scripts

      - name: Build
        run: corepack pnpm run build

      - name: Publish workspace packages
        run: corepack pnpm exec changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          NPM_CONFIG_REGISTRY: https://npm.pkg.github.com
