name: CI

on:
  pull_request:
  # Verify main after merges too: the Release workflow publishes from main, so
  # a bad merge resolution or direct push must not reach it unverified.
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Install, typecheck, and test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup workspace
        uses: ./.github/actions/setup

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: corepack pnpm run check

      - name: Test
        run: corepack pnpm test

      - name: Package dry run
        run: corepack pnpm run pack:dry

      - name: Changeset status
        # head_ref/base_ref only exist on pull_request events.
        if: ${{ github.event_name == 'pull_request' && !startsWith(github.head_ref, 'changeset-release/') }}
        run: corepack pnpm exec changeset status --since=origin/${{ github.base_ref }}
